<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASS BEATER 3000 - TURBO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #000000;
            --card: #111111;
            --text: #ffffff;
            --accent: #ef4444;
            --shreyas-color: #3b82f6; /* Blue for Shreyas */
            --ram-color: #ef4444;    /* Red for Ram */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        /* --- NEW: POWER BAR --- */
        .war-zone {
            width: 100%;
            max-width: 830px;
            padding: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .power-bar-container {
            height: 30px;
            background: #222;
            border: 3px solid var(--primary);
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
        #bar-shreyas { width: 50%; background: var(--shreyas-color); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #bar-ram { width: 50%; background: var(--ram-color); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- ANIMATIONS --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .settings-anchor {
            position: fixed;
            top: 60px;
            right: 20px;
            z-index: 1000;
            background: var(--card);
            border: 2px solid var(--primary);
            padding: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--accent);
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
            width: 100%;
        }

        .container { 
            text-align: center; 
            border: 4px solid var(--primary); 
            padding: 1.5rem; 
            background: var(--card); 
            box-shadow: 10px 10px 0px var(--accent);
            width: 100%;
            max-width: 400px;
            transition: transform 0.1s;
        }

        .counter {
            font-size: 5rem;
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 3px 3px 0px var(--accent);
            line-height: 1;
        }

        .rank { 
            font-size: 0.9rem; 
            color: var(--primary); 
            margin-bottom: 1.5rem; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        .btn-group { display: flex; gap: 10px; width: 100%; }

        .beat-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 20px 5px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px white;
            flex: 1;
        }

        .beat-btn.minus { background: #444; color: white; }
        .beat-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card);
            border: 4px solid var(--primary);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid var(--primary);
            color: white;
        }

        #insult-ticker {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="war-zone">
        <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px;">
            <span>SHREYAS DOMINANCE</span>
            <span>RAM DOMINANCE</span>
        </div>
        <div class="power-bar-container">
            <div id="bar-shreyas"></div>
            <div id="bar-ram"></div>
        </div>
        <div id="insult-ticker">INITIALIZING CHAOS...</div>
    </div>

    <div class="settings-anchor" onclick="openModal()">⚙️</div>

    <div class="main-wrapper">
        <!-- Target: Shreyas (Handled by RAM) -->
        <div class="container" id="cont-shreyas">
            <h1>ASS BEATER</h1>
            <div style="color:var(--shreyas-color); font-weight: bold;">TARGET: SHREYAS</div>
            <p style="font-size: 0.6rem;">A-Handler: RAM</p>
            <div class="counter" id="counter-shreyas">0</div>
            <div class="rank" id="rank-shreyas">PEACEFUL CITIZEN</div>
            <div class="btn-group">
                <button class="beat-btn minus" onclick="handleAction('ram', -1)">PARDON</button>
                <button class="beat-btn" onclick="handleAction('ram', 1)">BEAT ASS</button>
            </div>
            <button onclick="handleReset('ram')" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size: 0.6rem;">WIPE DATA</button>
        </div>

        <!-- Target: Ram (Handled by SHREYAS) -->
        <div class="container" id="cont-ram">
            <h1>ASS BEATER</h1>
            <div style="color:var(--ram-color); font-weight: bold;">TARGET: RAM</div>
            <p style="font-size: 0.6rem;">A-Handler: SHREYAS</p>
            <div class="counter" id="counter-ram">0</div>
            <div class="rank" id="rank-ram">PEACEFUL CITIZEN</div>
            <div class="btn-group">
                <button class="beat-btn minus" onclick="handleAction('shreyas', -1)">PARDON</button>
                <button class="beat-btn" onclick="handleAction('shreyas', 1)">BEAT ASS</button>
            </div>
            <button onclick="handleReset('shreyas')" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size: 0.6rem;">WIPE DATA</button>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="pwModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">SYSTEM SETTINGS</h3>
            <label style="font-size: 0.7rem;">USER SELECT</label>
            <select id="userSelect">
                <option value="shreyas">SHREYAS</option>
                <option value="ram">RAM</option>
            </select>
            <input type="password" id="currPass" placeholder="Current Password">
            <input type="password" id="newPass" placeholder="New Password">
            <div class="btn-group" style="margin-top:20px;">
                <button class="beat-btn minus" onclick="closeModal()">EXIT</button>
                <button class="beat-btn" onclick="updatePassword()">SAVE</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDx8q_rUrJv9hLQvHxJmnZ0m39bkhBK-UU",
      authDomain: "firetrack-29d9e.firebaseapp.com",
      projectId: "firetrack-29d9e",
      storageBucket: "firetrack-29d9e.firebasestorage.app",
      messagingSenderId: "901288643060",
      appId: "1:901288643060:web:5ca6fbc4dd6fa4b6c851a1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const refs = {
        shreyas: doc(db, "projects", "shreyas_hitting_ram"),
        ram: doc(db, "projects", "ram_hitting_shreyas")
    };

    const ranks = [
        { min: 0, text: "PEACEFUL CITIZEN" },
        { min: 5, text: "MINOR NUISANCE" },
        { min: 15, text: "PUBLIC ENEMY" },
        { min: 30, text: "CERTIFIED THREAT" },
        { min: 50, text: "APOCALYPTIC MENACE" },
        { min: 100, text: "GOD OF DESTRUCTION" }
    ];

    const insults = [
        "Someone call an ambulance... but not for me.",
        "Stop, stop! He's already dead!",
        "Absolute carnage in the arena.",
        "Imagine being this much of a target.",
        "The disrespect is palpable."
    ];

    async function initDB() {
        for (const key in refs) {
            const snap = await getDoc(refs[key]);
            if (!snap.exists()) {
                const defaultPass = (key === 'shreyas') ? "1234" : "shreyassbeat";
                await setDoc(refs[key], { count: 0, password: defaultPass });
            }
        }
    }
    initDB();

    // Listeners
    onSnapshot(refs.shreyas, (doc) => updateUI('ram', doc));
    onSnapshot(refs.ram, (doc) => updateUI('shreyas', doc));

    function updateUI(targetId, doc) {
        if (doc.exists()) {
            const val = doc.data().count || 0;
            const el = document.getElementById(`counter-${targetId}`);
            
            // Visual feedback on change
            if(el.innerText != val) {
                const container = document.getElementById(`cont-${targetId}`);
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 400);
            }

            el.innerText = val;
            const currentRank = [...ranks].reverse().find(r => val >= r.min);
            document.getElementById(`rank-${targetId}`).innerText = currentRank.text;
            
            updatePowerBar();
        }
    }

    function updatePowerBar() {
        const sVal = parseInt(document.getElementById('counter-shreyas').innerText) || 0;
        const rVal = parseInt(document.getElementById('counter-ram').innerText) || 0;
        const total = sVal + rVal;
        
        if (total > 0) {
            const sPerc = (sVal / total) * 100;
            const rPerc = (rVal / total) * 100;
            document.getElementById('bar-shreyas').style.width = sPerc + "%";
            document.getElementById('bar-ram').style.width = rPerc + "%";
            
            if(Math.random() > 0.7) {
                document.getElementById('insult-ticker').innerText = insults[Math.floor(Math.random()*insults.length)];
            }
        }
    }

    window.handleAction = async (user, change) => {
        const input = prompt(`CONFIRM IDENTITY [${user.toUpperCase()}]:`);
        const snap = await getDoc(refs[user]);
        
        if (input === snap.data().password) {
            // Haptics
            if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
            
            // Confetti for hits
            if(change > 0) {
                confetti({ 
                    particleCount: 100, 
                    spread: 70, 
                    origin: { y: 0.6 },
                    colors: [user === 'ram' ? '#3b82f6' : '#ef4444', '#fbbf24']
                });
            }
            
            await updateDoc(refs[user], { count: increment(change) });
        } else {
            alert("WRONG PASSWORD. THE AUDACITY.");
        }
    };

    window.handleReset = async (user) => {
        const input = prompt(`MASTER RESET PASSWORD:`);
        const snap = await getDoc(refs[user]);
        if (input === snap.data().password && confirm("WIPE ALL PROGRESS?")) {
            await updateDoc(refs[user], { count: 0 });
        }
    };

    window.openModal = () => document.getElementById('pwModal').style.display = 'flex';
    window.closeModal = () => document.getElementById('pwModal').style.display = 'none';

    window.updatePassword = async () => {
        const user = document.getElementById('userSelect').value;
        const curr = document.getElementById('currPass').value;
        const next = document.getElementById('newPass').value;
        if(!next) return alert("EMPTY PASSWORD NOT ALLOWED");

        const snap = await getDoc(refs[user]);
        if (curr === snap.data().password) {
            await updateDoc(refs[user], { password: next });
            alert("ENCRYPTION UPDATED.");
            closeModal();
        } else {
            alert("CURRENT PASSWORD INVALID.");
        }
    };
</script>
</body>
</html>
