
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASS BEATER 3000 - TURBO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #000000;
            --card: #111111;
            --text: #ffffff;
            --accent: #ef4444;
            --shreyas-color: #3b82f6; 
            --ram-color: #ef4444;    
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
            padding-bottom: 50px;
        }

        /* --- LAYOUT RESTRUCTURE --- */
        
        .settings-header {
            width: 100%;
            display: flex;
            justify-content: space-between; /* Adjusted for two icons */
            padding: 20px;
            max-width: 400px;
        }

        .settings-btn {
            background: var(--card);
            border: 2px solid var(--primary);
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 4px 4px 0px var(--accent);
            transition: 0.1s;
        }
        .settings-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px; }

        .war-zone {
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .power-bar-container {
            height: 25px;
            background: #222;
            border: 3px solid var(--primary);
            display: flex;
            overflow: hidden;
        }
        #bar-shreyas { width: 50%; background: var(--shreyas-color); transition: width 0.5s ease; }
        #bar-ram { width: 50%; background: var(--ram-color); transition: width 0.5s ease; }

        #insult-ticker {
            color: var(--accent);
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            height: 15px;
            font-weight: bold;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            padding: 0 20px;
        }

        .container { 
            text-align: center; 
            border: 4px solid var(--primary); 
            padding: 1.5rem; 
            background: var(--card); 
            box-shadow: 10px 10px 0px var(--accent);
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.8rem; margin: 0; letter-spacing: -1px; }
        .target-label { font-size: 1.1rem; margin: 5px 0; border-bottom: 2px solid #333; padding-bottom: 5px; font-weight: 900;}
        
        .counter {
            font-size: 5rem;
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 3px 3px 0px var(--accent);
            line-height: 1;
        }

        .rank { 
            font-size: 0.8rem; 
            color: var(--primary); 
            margin-bottom: 1.5rem; 
            font-weight: bold;
        }

        .btn-group { display: flex; gap: 10px; width: 100%; }

        .beat-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 18px 5px;
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px white;
            flex: 1;
        }

        .beat-btn.minus { background: #444; color: white; }
        .beat-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card);
            border: 4px solid var(--primary);
            padding: 2rem; width: 90%; max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal input, .modal select {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #222; border: 1px solid var(--primary); color: white;
        }
        .history-item {
            border-bottom: 1px solid #333;
            padding: 10px 0;
            font-size: 0.7rem;
            text-align: left;
        }
        .history-user { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="settings-header">
        <div class="settings-btn" onclick="openHistory()">📜</div>
        <div class="settings-btn" onclick="openModal()">⚙️</div>
    </div>

    <div class="war-zone">
        <div style="display: flex; justify-content: space-between; font-size: 0.6rem; margin-bottom: 5px; font-weight: bold;">
            <span style="color:var(--shreyas-color)">SHREYAS TARGETED</span>
            <span style="color:var(--ram-color)">RAM TARGETED</span>
        </div>
        <div class="power-bar-container">
            <div id="bar-shreyas"></div>
            <div id="bar-ram"></div>
        </div>
        <div id="insult-ticker">WAITING FOR FIRST STRIKE...</div>
    </div>

    <div class="main-wrapper">
        <div class="container" id="cont-shreyas">
            <h1>ASS BEATER</h1>
            <div class="target-label" style="color:var(--shreyas-color)">TARGET: SHREYAS</div>
            <p style="font-size: 0.6rem; letter-spacing: 1px;">A-Handler: RAM</p>
            <div class="counter" id="counter-shreyas">0</div>
            <div class="rank" id="rank-shreyas">PEACEFUL CITIZEN</div>
            <div class="btn-group">
                <button class="beat-btn minus" onclick="handleAction('ram', -1)">PARDON</button>
                <button class="beat-btn" onclick="handleAction('ram', 1)">BEAT ASS</button>
            </div>
            <button onclick="handleReset('ram')" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size: 0.6rem;">WIPE DATA</button>
        </div>

        <div class="container" id="cont-ram">
            <h1>ASS BEATER</h1>
            <div class="target-label" style="color:var(--ram-color)">TARGET: RAM</div>
            <p style="font-size: 0.6rem; letter-spacing: 1px;">A-Handler: SHREYAS</p>
            <div class="counter" id="counter-ram">0</div>
            <div class="rank" id="rank-ram">PEACEFUL CITIZEN</div>
            <div class="btn-group">
                <button class="beat-btn minus" onclick="handleAction('shreyas', -1)">PARDON</button>
                <button class="beat-btn" onclick="handleAction('shreyas', 1)">BEAT ASS</button>
            </div>
            <button onclick="handleReset('shreyas')" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size: 0.6rem;">WIPE DATA</button>
        </div>
    </div>

    <div id="pwModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">SYSTEM ACCESS</h3>
            <select id="userSelect">
                <option value="shreyas">SHREYAS</option>
                <option value="ram">RAM</option>
            </select>
            <input type="password" id="currPass" placeholder="Current Password">
            <input type="password" id="newPass" placeholder="New Password">
            <div class="btn-group" style="margin-top:20px;">
                <button class="beat-btn minus" onclick="closeModal()">CANCEL</button>
                <button class="beat-btn" onclick="updatePassword()">SAVE</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">BATTLE LOG</h3>
            <div id="history-list"></div>
            <button class="beat-btn" style="margin-top:20px; width:100%;" onclick="closeHistory()">CLOSE</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDx8q_rUrJv9hLQvHxJmnZ0m39bkhBK-UU",
      authDomain: "firetrack-29d9e.firebaseapp.com",
      projectId: "firetrack-29d9e",
      storageBucket: "firetrack-29d9e.firebasestorage.app",
      messagingSenderId: "901288643060",
      appId: "1:901288643060:web:5ca6fbc4dd6fa4b6c851a1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const refs = {
        shreyas: doc(db, "projects", "shreyas_hitting_ram"), 
        ram: doc(db, "projects", "ram_hitting_shreyas")     
    };

    const ranks = [
        { min: 0, text: "PEACEFUL CITIZEN" },
        { min: 5, text: "MINOR NUISANCE" },
        { min: 15, text: "PUBLIC ENEMY" },
        { min: 30, text: "CERTIFIED THREAT" },
        { min: 50, text: "APOCALYPTIC" },
        { min: 100, text: "TERMINATOR" }
    ];

    const messages = ["Ouch.", "Violent today, aren't we?", "Call the police.", "Absolute savagery.", "The bar is shifting!"];
    let historyData = { ram: [], shreyas: [] };

    async function initDB() {
        for (const key in refs) {
            const snap = await getDoc(refs[key]);
            if (!snap.exists()) {
                const defaultPass = (key === 'shreyas') ? "1234" : "shreyassbeat";
                await setDoc(refs[key], { count: 0, password: defaultPass, history: [] });
            }
        }
    }
    initDB();

    onSnapshot(refs.shreyas, (doc) => {
        updateUI('ram', doc);
        if(doc.exists()) historyData.ram = doc.data().history || [];
    });
    onSnapshot(refs.ram, (doc) => {
        updateUI('shreyas', doc);
        if(doc.exists()) historyData.shreyas = doc.data().history || [];
    });

    function updateUI(targetId, doc) {
        if (doc.exists()) {
            const val = doc.data().count || 0;
            const el = document.getElementById(`counter-${targetId}`);
            
            if(el.innerText != val && el.innerText != "") {
                const container = document.getElementById(`cont-${targetId}`);
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 300);
            }

            el.innerText = val;
            const currentRank = [...ranks].reverse().find(r => val >= r.min);
            document.getElementById(`rank-${targetId}`).innerText = currentRank.text;
            
            refreshPowerBar();
        }
    }

    function refreshPowerBar() {
        const sVal = parseInt(document.getElementById('counter-shreyas').innerText) || 0;
        const rVal = parseInt(document.getElementById('counter-ram').innerText) || 0;
        const total = sVal + rVal;
        
        if (total > 0) {
            const sPerc = (sVal / total) * 100;
            const rPerc = (rVal / total) * 100;
            document.getElementById('bar-shreyas').style.width = sPerc + "%";
            document.getElementById('bar-ram').style.width = rPerc + "%";
            
            if(Math.random() > 0.8) {
                document.getElementById('insult-ticker').innerText = messages[Math.floor(Math.random()*messages.length)];
            }
        }
    }

    window.handleAction = async (user, change) => {
        const input = prompt(`PASSCODE [${user.toUpperCase()}]:`);
        const snap = await getDoc(refs[user]);
        if (input === snap.data().password) {
            let reason = "";
            if(change > 0) {
                reason = prompt("REASON FOR BEATING ASS:") || "No reason, just pure hate.";
                if (window.navigator.vibrate) window.navigator.vibrate(100);
                confetti({ 
                    particleCount: 50, spread: 60, 
                    colors: [user === 'ram' ? '#3b82f6' : '#ef4444', '#ffffff'] 
                });
            } else {
                reason = "Pardoned by mercy.";
            }

            const historyEntry = {
                reason: reason,
                time: new Date().toLocaleTimeString(),
                type: change > 0 ? "BEAT" : "PARDON"
            };

            await updateDoc(refs[user], { 
                count: increment(change),
                history: arrayUnion(historyEntry)
            });
        } else {
            alert("WRONG PASSWORD smart CHADDI.");
        }
    };

    window.openHistory = () => {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        
        const combined = [
            ...historyData.ram.map(h => ({...h, from: 'RAM', to: 'SHREYAS'})),
            ...historyData.shreyas.map(h => ({...h, from: 'SHREYAS', to: 'RAM'}))
        ].sort((a,b) => b.time.localeCompare(a.time)).slice(0, 10);

        if(combined.length === 0) list.innerHTML = "<p>No blood spilled yet.</p>";

        combined.forEach(item => {
            const div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = `<span class="history-user">${item.from}</span> ${item.type}ED <span class="history-user">${item.to}</span><br>
                             <span style="color:#888; font-size:0.6rem;">[${item.time}]</span> ${item.reason}`;
            list.appendChild(div);
        });
        document.getElementById('historyModal').style.display = 'flex';
    };

    window.closeHistory = () => document.getElementById('historyModal').style.display = 'none';

    window.handleReset = async (user) => {
        const input = prompt(`ADMIN PASSWORD:`);
        const snap = await getDoc(refs[user]);
        if (input === snap.data().password && confirm("ARE YOU SURE?")) {
            await updateDoc(refs[user], { count: 0, history: [] });
        }
    };

    window.openModal = () => document.getElementById('pwModal').style.display = 'flex';
    window.closeModal = () => document.getElementById('pwModal').style.display = 'none';

    window.updatePassword = async () => {
        const user = document.getElementById('userSelect').value;
        const curr = document.getElementById('currPass').value;
        const next = document.getElementById('newPass').value;
        const snap = await getDoc(refs[user]);
        if (curr === snap.data().password) {
            await updateDoc(refs[user], { password: next });
            alert("PASSWORD UPDATED");
            closeModal();
        } else {
            alert("OLD PASSWORD WRONG");
        }
    };
</script>
</body>
</html>
